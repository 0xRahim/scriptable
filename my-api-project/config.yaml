project: "My API Tests"

targets:
  - name: "httpbin"
    url: "https://httpbin.org/post"
    headers: {}
    params:
      q: "test"

run:
  templates: all
  workflows: all

skip:
  templates: []

# NEW
execution:
  mode: threaded        # "sequential" or "threaded"
  max_workers: 5        # ignored in sequential mode
  delay: 0.2            # seconds between thread submissions, 0 = no delay
